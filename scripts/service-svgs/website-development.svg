<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060d1a"/>
      <stop offset="0.5" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#0d1f2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.5">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes rev { 0%{transform:scaleX(0);} 100%{transform:scaleX(1);} }
    @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
    @keyframes progress { 0%{transform:scaleX(0);} 70%{transform:scaleX(1);} 100%{transform:scaleX(1);} }
    @keyframes pop { 0%{opacity:0;transform:scale(.85);} 100%{opacity:1;transform:scale(1);} }
    .line { transform-box: fill-box; transform-origin: left center; animation: rev .5s ease forwards; }
    .l1{animation-delay:.2s} .l2{animation-delay:.5s} .l3{animation-delay:.8s} .l4{animation-delay:1.1s} .l5{animation-delay:1.4s}
    .cursor { animation: blink 1s step-end infinite; }
    .bar { transform-box: fill-box; transform-origin: left center; animation: progress 3s ease-in-out infinite; }
    .block { opacity:0; transform-box: fill-box; transform-origin: center; }
    .b1{animation: pop .4s ease 1.8s forwards} .b2{animation: pop .4s ease 2.1s forwards} .b3{animation: pop .4s ease 2.4s forwards}
  </style>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <rect x="100" y="110" width="600" height="380" rx="22" fill="#0a1018" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>

  <circle cx="135" cy="150" r="8" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="163" cy="150" r="8" fill="#eab308" fill-opacity="0.7"/>
  <circle cx="191" cy="150" r="8" fill="#22c55e" fill-opacity="0.8"/>
  <text x="240" y="156" fill="#64748b" font-size="15" font-family="monospace">app.tsx</text>
  <line x1="100" y1="180" x2="700" y2="180" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>

  <rect x="100" y="180" width="600" height="5" fill="#ffffff" fill-opacity="0.06"/>
  <rect class="bar" x="100" y="180" width="600" height="5" fill="#22c55e" fill-opacity="0.85"/>

  <rect class="line l1" x="140" y="216" width="360" height="14" rx="7" fill="#22c55e" fill-opacity="0.6"/>
  <rect class="line l2" x="140" y="250" width="250" height="14" rx="7" fill="#64748b" fill-opacity="0.5"/>
  <rect class="line l3" x="140" y="284" width="430" height="14" rx="7" fill="#22c55e" fill-opacity="0.45"/>
  <rect class="line l4" x="140" y="318" width="210" height="14" rx="7" fill="#64748b" fill-opacity="0.45"/>
  <rect class="line l5" x="140" y="352" width="320" height="14" rx="7" fill="#22c55e" fill-opacity="0.55"/>
  <rect class="cursor" x="470" y="348" width="4" height="22" fill="#22c55e"/>

  <g class="block b1">
    <rect x="140" y="408" width="165" height="56" rx="12" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="222" y="442" text-anchor="middle" fill="#86efac" font-size="15" font-weight="bold">Header</text>
  </g>
  <g class="block b2">
    <rect x="320" y="408" width="165" height="56" rx="12" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="402" y="442" text-anchor="middle" fill="#86efac" font-size="15" font-weight="bold">Hero</text>
  </g>
  <g class="block b3">
    <rect x="500" y="408" width="160" height="56" rx="12" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="580" y="442" text-anchor="middle" fill="#86efac" font-size="15" font-weight="bold">CTA</text>
  </g>
</svg>
