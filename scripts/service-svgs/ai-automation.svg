<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060d1a"/>
      <stop offset="0.5" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#0d1f2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.12" r="0.5">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#22c55e" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
    @keyframes fade { 0%{opacity:0;transform:translateY(12px);} 100%{opacity:1;transform:translateY(0);} }
    @keyframes dash { to { stroke-dashoffset: -56; } }
    @keyframes travel { 0%{transform:translateX(0);opacity:0;} 12%{opacity:1;} 88%{opacity:1;} 100%{transform:translateX(450px);opacity:0;} }
    .agent { transform-box: fill-box; transform-origin: center; animation: pulse 2s ease-in-out infinite; }
    .chip { opacity:0; transform-box: fill-box; }
    .chip1 { animation: fade .7s ease .3s infinite alternate; }
    .chip2 { animation: fade .7s ease .8s infinite alternate; }
    .flow { stroke-dasharray: 16 12; animation: dash 1.1s linear infinite; }
    .dot { animation: travel 2.8s ease-in-out infinite; }
  </style>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <line class="flow" x1="210" y1="300" x2="590" y2="300" stroke="#22c55e" stroke-opacity="0.5" stroke-width="3"/>

  <g class="dot"><circle cx="210" cy="300" r="9" fill="#22c55e"/></g>

  <g>
    <rect x="70" y="250" width="140" height="100" rx="18" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.4" stroke-width="2"/>
    <text x="140" y="296" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="bold">Trigger</text>
    <text x="140" y="322" text-anchor="middle" fill="#94a3b8" font-size="14">Webhook</text>
  </g>

  <g class="agent">
    <rect x="330" y="240" width="140" height="120" rx="20" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-opacity="0.7" stroke-width="2.5"/>
    <text x="400" y="292" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">AI Agent</text>
    <text x="400" y="320" text-anchor="middle" fill="#86efac" font-size="14">reasoning</text>
  </g>

  <g>
    <rect x="590" y="250" width="140" height="100" rx="18" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.4" stroke-width="2"/>
    <text x="660" y="296" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="bold">Action</text>
    <text x="660" y="322" text-anchor="middle" fill="#94a3b8" font-size="14">CRM sync</text>
  </g>

  <g class="chip chip1">
    <rect x="232" y="92" width="150" height="46" rx="23" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4"/>
    <text x="307" y="121" text-anchor="middle" fill="#86efac" font-size="16" font-weight="bold">24/7 uptime</text>
  </g>
  <g class="chip chip2">
    <rect x="412" y="92" width="166" height="46" rx="23" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4"/>
    <text x="495" y="121" text-anchor="middle" fill="#86efac" font-size="16" font-weight="bold">95% accuracy</text>
  </g>
</svg>
